<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in to your account</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Inter', -apple-system, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f3f2f1;
      background-image: radial-gradient(circle at top left, #dfebf6, #f3f2f1 50%);
    }

    .login-card {
      position: relative;
      width: 100%;
      max-width: 440px;
      background: #ffffff;
      padding: 44px;
      text-align: left;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      border-radius: 0;
      color: #1b1b1b;
    }

    .login-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .brand-mark {
      width: 32px;
      height: 32px;
      background: #6366f1;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 16px;
    }

    .login-brand-name {
      font-size: 18px;
      font-weight: 600;
      color: #1b1b1b;
    }

    .login-headline {
      font-size: 24px;
      font-weight: 600;
      margin: 0 0 8px 0;
      color: #1b1b1b;
    }

    .login-sub {
      font-size: 15px;
      color: #1b1b1b;
      margin: 0 0 32px 0;
    }

    .oauth-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 10px 12px;
      font-size: 15px;
      font-weight: 400;
      border: 1px solid #8a8886;
      background: #ffffff;
      color: #1b1b1b;
      cursor: pointer;
      transition: background 0.1s;
      text-decoration: none;
      margin-bottom: 12px;
    }

    .oauth-btn:hover { background: #f3f2f1; }
    .oauth-btn svg { width: 20px; height: 20px; }

    .oauth-ms {
      background: #0067b8;
      color: #fff;
      border-color: #0067b8;
    }
    .oauth-ms:hover { background: #005da6; }

    .or-divider {
      text-align: center;
      margin: 16px 0;
      color: #605e5c;
      font-size: 13px;
    }

    .back-btn {
      position: absolute;
      top: 32px;
      left: 32px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #1b1b1b;
      text-decoration: none;
      font-size: 14px;
      transition: opacity 0.2s;
    }
    .back-btn:hover { opacity: 0.7; }

    .login-footer {
      margin-top: 32px;
      font-size: 12px;
      color: #605e5c;
      line-height: 1.5;
    }

    .demo-login-section {
      margin-bottom: 24px;
    }

    .demo-login-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #888;
      margin-bottom: 10px;
    }

    .demo-login-btns {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .demo-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border: 1px solid #e1dfdd;
      background: #fff;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
      border-radius: 4px;
      width: 100%;
    }

    .demo-btn:hover {
      border-color: #000;
      background: #f9f9f9;
    }

    .demo-btn.owner {
      border-left: 3px solid #000;
    }

    .demo-btn.employee {
      border-left: 3px solid #888;
    }

    .demo-btn-icon {
      font-size: 20px;
      flex-shrink: 0;
    }

    .demo-btn-title {
      font-size: 14px;
      font-weight: 600;
      color: #1b1b1b;
      margin-bottom: 2px;
    }

    .demo-btn-sub {
      font-size: 12px;
      color: #888;
    }

    .demo-login-divider {
      text-align: center;
      font-size: 12px;
      color: #aaa;
      font-weight: 500;
      padding: 8px 0;
      border-top: 1px solid #f0f0f0;
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    Back
  </a>

  <div class="login-card">
    <div class="login-brand">
      <span class="brand-mark">N</span>
      <span class="login-brand-name">Nudge Workspace</span>
    </div>

    <h1 class="login-headline">Sign in</h1>
    <p class="login-sub">to continue to Nudge</p>

    <!-- Demo login section -->
    <div class="demo-login-section" id="demoSection">
      <div class="demo-login-label">Try the demo</div>
      <div class="demo-login-btns">
        <button class="demo-btn owner" id="demoOwnerBtn">
          <div class="demo-btn-icon">👑</div>
          <div class="demo-btn-body">
            <div class="demo-btn-title">Login as Owner</div>
            <div class="demo-btn-sub">See the full Business OS</div>
          </div>
        </button>
        <button class="demo-btn employee" id="demoEmployeeBtn">
          <div class="demo-btn-icon">👤</div>
          <div class="demo-btn-body">
            <div class="demo-btn-title">Login as Employee</div>
            <div class="demo-btn-sub">See the agent dashboard</div>
          </div>
        </button>
      </div>
      <div class="demo-login-divider">or sign in with your account</div>
    </div>

    <div style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px;">
      <input type="email" id="emailInput" placeholder="Email address" style="padding: 10px; border: 1px solid #ccc; font-size: 14px; outline: none; border-radius: 4px;">
      <input type="password" id="passwordInput" placeholder="Password" style="padding: 10px; border: 1px solid #ccc; font-size: 14px; outline: none; border-radius: 4px;">
      <div style="display: flex; gap: 8px;">
        <button id="signInBtn" style="flex: 1; padding: 10px; background: #1b1b1b; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; transition: background 0.2s;">Sign In</button>
        <button id="signUpBtn" style="flex: 1; padding: 10px; background: #ffffff; color: #1b1b1b; border: 1px solid #1b1b1b; border-radius: 4px; cursor: pointer; font-size: 14px; transition: background 0.2s;">Sign Up</button>
      </div>
      <div id="authMessage" style="font-size: 13px; color: #d32f2f; text-align: center; min-height: 18px;"></div>
    </div>

    <div class="or-divider">Or continue with</div>

    <a href="#" class="oauth-btn oauth-ms" id="connectMicrosoftBtn">
      <svg viewBox="0 0 21 21" fill="currentColor">
        <path d="M0 0h10v10H0z" fill="#f25022"/>
        <path d="M11 0h10v10H11z" fill="#7fba00"/>
        <path d="M0 11h10v10H0z" fill="#00a4ef"/>
        <path d="M11 11h10v10H11z" fill="#ffb900"/>
      </svg>
      Sign in with Microsoft
    </a>

    <a href="#" class="oauth-btn" id="connectGoogleBtn">
      <svg viewBox="0 0 18 18" fill="currentColor">
        <path d="M9 3.48c1.69 0 2.83.73 3.48 1.34l2.54-2.48C13.46.89 11.43 0 9 0 5.48 0 2.44 2.02.96 4.96l2.91 2.26C4.6 5.05 6.62 3.48 9 3.48z" fill="#EA4335"/>
        <path d="M17.64 9.2c0-.74-.06-1.28-.19-1.84H9v3.34h4.96c-.1.83-.64 2.08-1.84 2.92l2.84 2.2c1.7-1.57 2.68-3.88 2.68-6.62z" fill="#4285F4"/>
        <path d="M3.88 10.78A5.54 5.54 0 0 1 3.58 9c0-.62.11-1.22.29-1.78L.96 4.96A9.008 9.008 0 0 0 0 9c0 1.45.35 2.82.96 4.04l2.92-2.26z" fill="#FBBC05"/>
        <path d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.84-2.2c-.76.53-1.78.9-3.12.9-2.38 0-4.4-1.57-5.12-3.74L.97 13.04C2.45 15.98 5.48 18 9 18z" fill="#34A853"/>
      </svg>
      Sign in with Google
    </a>

    <p class="login-footer">
      OAuth tokens stored server-side only. Nudge AI only receives command summaries — never raw email content.
    </p>
  </div>

  <!-- Supabase CDN must load before supabaseClient.js -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const emailInput    = document.getElementById('emailInput');
      const passwordInput = document.getElementById('passwordInput');
      const signInBtn     = document.getElementById('signInBtn');
      const signUpBtn     = document.getElementById('signUpBtn');
      const authMessage   = document.getElementById('authMessage');

      const showMsg = (msg, isError = true) => {
        authMessage.style.color = isError ? '#d32f2f' : '#2e7d32';
        authMessage.textContent = msg;
      };

      // Clear any stale Supabase auth tokens left in localStorage
      // (from before persistSession was disabled)
      Object.keys(localStorage)
        .filter(k => k.startsWith('sb-') || k === 'supabase.auth.token')
        .forEach(k => localStorage.removeItem(k));

      // Demo login flow
      const urlParams = new URLSearchParams(window.location.search);
      const roleParam = urlParams.get('role');

      function loginAsOwner() {
        localStorage.setItem('nudge_demo_mode', 'true');
        localStorage.setItem('nudge_user_role', 'owner');
        localStorage.setItem('nudge_user_name', 'Alex Morgan');
        localStorage.setItem('nudge_company_name', 'Nexus Co.');
        localStorage.setItem('nudge_company_id', 'demo_company_001');
        window.location.href = 'owner.html';
      }

      function loginAsEmployee() {
        localStorage.setItem('nudge_demo_mode', 'true');
        localStorage.setItem('nudge_user_role', 'employee');
        localStorage.setItem('nudge_user_name', 'Sarah Mitchell');
        localStorage.setItem('nudge_company_name', 'Nexus Co.');
        localStorage.setItem('nudge_company_id', 'demo_company_001');
        window.location.href = 'dashboard.html';
      }

      document.getElementById('demoOwnerBtn')
        ?.addEventListener('click', loginAsOwner);
      document.getElementById('demoEmployeeBtn')
        ?.addEventListener('click', loginAsEmployee);

      // Auto-trigger if coming from index.html with role param
      if (roleParam === 'owner') loginAsOwner();
      if (roleParam === 'employee') loginAsEmployee();

      // Wait for supabaseClient to initialize (CDN may still be loading)
      async function waitForClient() {
        let retries = 0;
        while (!window.supabaseClient && retries < 20) {
          await new Promise(r => setTimeout(r, 100));
          retries++;
        }
        return window.supabaseClient;
      }

      signInBtn.addEventListener('click', async () => {
        const email    = emailInput.value.trim();
        const password = passwordInput.value;
        if (!email || !password) return showMsg('Please enter email and password.');

        signInBtn.textContent = 'Signing in...';
        signInBtn.disabled    = true;

        const client = await waitForClient();
        if (!client) {
          showMsg('Connection error. Please refresh and try again.');
          signInBtn.textContent = 'Sign In';
          signInBtn.disabled    = false;
          return;
        }

        const { data, error } = await client.auth.signInWithPassword({ email, password });

        if (error) {
          showMsg(error.message);
          signInBtn.textContent = 'Sign In';
          signInBtn.disabled    = false;
        } else {
          showMsg('Success! Redirecting...', false);
          window.location.href = 'dashboard.html';
        }
      });

      signUpBtn.addEventListener('click', async () => {
        const email    = emailInput.value.trim();
        const password = passwordInput.value;
        if (!email || !password) return showMsg('Please enter email and password.');

        signUpBtn.textContent = 'Signing up...';
        signUpBtn.disabled    = true;

        const client = await waitForClient();
        if (!client) {
          showMsg('Connection error. Please refresh and try again.');
          signUpBtn.textContent = 'Sign Up';
          signUpBtn.disabled    = false;
          return;
        }

        const { data, error } = await client.auth.signUp({ email, password });

        if (error) {
          showMsg(error.message);
        } else if (data.user && data.user.identities && data.user.identities.length === 0) {
          showMsg('Email already in use.');
        } else {
          showMsg('Account created! Check your email to confirm, then sign in.', false);
        }
        signUpBtn.textContent = 'Sign Up';
        signUpBtn.disabled    = false;
      });
    });
  </script>

<script type="module">
  import { signInWithGoogle, 
           signInWithMicrosoft } 
    from './js/supabaseClient.js';

  document.getElementById('connectGoogleBtn')
    ?.addEventListener('click', e => {
      e.preventDefault();
      signInWithGoogle();
    });

  document.getElementById('connectMicrosoftBtn')
    ?.addEventListener('click', e => {
      e.preventDefault();
      signInWithMicrosoft();
    });

  document.getElementById('tryDemoBtn')
    ?.addEventListener('click', e => {
      e.preventDefault();
      localStorage.setItem('nudge_demo_mode', 
        'true');
      window.location.href = 'dashboard.html';
    });
</script>
</body>
</html>
